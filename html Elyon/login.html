<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elyon — Entrar</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,400&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #0C0B09;
  --bg2: #141210;
  --bg3: #1C1914;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.14);
  --text: #F2EDE4;
  --text2: #9A9080;
  --text3: #5C5448;
  --gold: #C8903A;
  --gold2: #E4AF60;
  --gold-bg: rgba(200,144,58,0.08);
  --gold-bdr: rgba(200,144,58,0.2);
  --green: #2D7A5F;
  --red: #C0392B;
  --serif: 'Cormorant Garamond', serif;
  --sans: 'Outfit', sans-serif;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
  overflow: hidden;
}
body::before {
  content: '';
  position: fixed; inset: 0;
  background: radial-gradient(ellipse 60% 60% at 50% 50%, rgba(200,144,58,0.05) 0%, transparent 70%);
  pointer-events: none;
}
.card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: 20px;
  padding: 48px 40px;
  width: 100%;
  max-width: 420px;
  animation: fadeUp .4s ease;
}
@keyframes fadeUp { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }
.brand {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 36px;
  justify-content: center;
}
.brand-mark {
  width: 38px; height: 38px;
  background: var(--gold);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-family: var(--serif);
  font-size: 20px; font-style: italic;
  color: var(--bg);
}
.brand-name { font-family: var(--serif); font-size: 22px; }

.tab-row {
  display: flex; gap: 0;
  background: var(--bg3);
  border-radius: 10px;
  padding: 4px;
  margin-bottom: 28px;
}
.tab {
  flex: 1; text-align: center;
  padding: 9px;
  border-radius: 7px;
  font-size: 13px; font-weight: 500;
  cursor: pointer;
  color: var(--text2);
  transition: all .2s;
}
.tab.active { background: var(--bg2); color: var(--text); box-shadow: 0 2px 8px rgba(0,0,0,0.3); }

h2 { font-family: var(--serif); font-size: 24px; font-weight: 300; margin-bottom: 6px; }
.subtitle { font-size: 13px; color: var(--text2); margin-bottom: 24px; }

.form-group { margin-bottom: 16px; }
.form-label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: .06em; text-transform: uppercase; display: block; margin-bottom: 8px; }
.form-input {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 12px 14px;
  font-family: var(--sans); font-size: 14px;
  color: var(--text);
  outline: none;
  transition: border-color .2s;
}
.form-input:focus { border-color: var(--gold); }
.form-input::placeholder { color: var(--text3); }

.role-select {
  display: grid; grid-template-columns: 1fr 1fr 1fr;
  gap: 8px; margin-bottom: 16px;
}
.role-btn {
  padding: 10px 6px;
  border-radius: 8px;
  border: 1px solid var(--border2);
  background: var(--bg3);
  color: var(--text2);
  font-family: var(--sans);
  font-size: 11px; font-weight: 500;
  cursor: pointer;
  text-align: center;
  transition: all .2s;
}
.role-btn .role-icon { font-size: 18px; display: block; margin-bottom: 4px; }
.role-btn.active { background: var(--gold-bg); border-color: var(--gold-bdr); color: var(--gold2); }

.btn-submit {
  width: 100%;
  background: var(--gold);
  color: var(--bg);
  border: none;
  padding: 13px;
  border-radius: 8px;
  font-family: var(--sans);
  font-size: 14px; font-weight: 600;
  cursor: pointer;
  transition: background .2s;
  margin-top: 4px;
}
.btn-submit:hover { background: var(--gold2); }
.btn-submit:disabled { opacity: .5; cursor: not-allowed; }

.error-msg {
  background: rgba(192,57,43,0.1);
  border: 1px solid rgba(192,57,43,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #E07060;
  margin-bottom: 16px;
  display: none;
}
.success-msg {
  background: rgba(45,122,95,0.1);
  border: 1px solid rgba(45,122,95,0.3);
  border-radius: 8px;
  padding: 10px 14px;
  font-size: 13px;
  color: #5DB896;
  margin-bottom: 16px;
  display: none;
}

.divider { text-align: center; font-size: 12px; color: var(--text3); margin: 16px 0; }
.link-btn { background: none; border: none; color: var(--gold2); cursor: pointer; font-family: var(--sans); font-size: 13px; text-decoration: underline; }

@media (max-width: 480px) {
  .card { padding: 32px 24px; }
}
.btn-back {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  color: var(--text2);
  font-size: 13px;
  text-decoration: none;
  margin-bottom: 24px;
  transition: color .2s;
  font-family: var(--sans);
}
.btn-back:hover { color: var(--gold2); }
.btn-back svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<div class="card">
  <a href="landing-page_1.html" class="btn-back">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    Voltar ao início
  </a>
  <div class="brand">
    <div class="brand-mark">E</div>
    <span class="brand-name">Elyon</span>
  </div>

  <div class="tab-row">
    <div class="tab active" onclick="showTab('login')">Entrar</div>
    <div class="tab" onclick="showTab('cadastro')">Cadastrar</div>
  </div>

  <!-- LOGIN -->
  <div id="tab-login">
    <h2>Bem-vindo de volta</h2>
    <p class="subtitle">Acesse sua conta Elyon</p>
    <div class="error-msg" id="login-error"></div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" type="email" id="login-email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" id="login-senha" placeholder="••••••••">
    </div>
    <button class="btn-submit" onclick="fazerLogin()" id="btn-login">Entrar →</button>
  </div>

  <!-- CADASTRO -->
  <div id="tab-cadastro" style="display:none;">
    <h2>Criar conta</h2>
    <p class="subtitle">Escolha seu perfil na plataforma</p>

    <div class="role-select">
      <div class="role-btn active" onclick="selectRole('colaborador',this)">
        <span class="role-icon">🎵</span>Colaborador
      </div>
      <div class="role-btn" onclick="selectRole('professor',this)">
        <span class="role-icon">🎸</span>Professor
      </div>
      <div class="role-btn" onclick="selectRole('rh',this)">
        <span class="role-icon">🏢</span>RH
      </div>
    </div>

    <div class="error-msg" id="cadastro-error"></div>
    <div class="success-msg" id="cadastro-success"></div>

    <div class="form-group">
      <label class="form-label">Nome completo</label>
      <input class="form-input" type="text" id="cadastro-nome" placeholder="Seu nome">
    </div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input class="form-input" type="email" id="cadastro-email" placeholder="seu@email.com">
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input class="form-input" type="password" id="cadastro-senha" placeholder="Mínimo 6 caracteres">
    </div>
    <button class="btn-submit" onclick="fazerCadastro()" id="btn-cadastro">Criar conta →</button>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
  import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'
  import { getFirestore, doc, setDoc, getDoc } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'

  const firebaseConfig = {
    apiKey: "AIzaSyDkXEI77NRsN52ojk0La4_hgOVmK6sdq1c",
    authDomain: "elyon-hub.firebaseapp.com",
    projectId: "elyon-hub",
    storageBucket: "elyon-hub.firebasestorage.app",
    messagingSenderId: "798443608741",
    appId: "1:798443608741:web:310a082137f374bfe74b4c"
  }

  const app = initializeApp(firebaseConfig)
  const auth = getAuth(app)
  const db = getFirestore(app)

  let selectedRole = 'colaborador'

  // Verificar se já está logado
  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userDoc = await getDoc(doc(db, 'users', user.uid))
      if (userDoc.exists()) {
        const role = userDoc.data().role
        redirectByRole(role)
      }
    }
  })

  function redirectByRole(role) {
    if (role === 'professor') window.location.href = 'portal-professor_1.html'
    else if (role === 'rh') window.location.href = 'portal-rh_1.html'
    else window.location.href = 'app-colaborador_2.html'
  }

  window.selectRole = function(role, el) {
    selectedRole = role
    document.querySelectorAll('.role-btn').forEach(b => b.classList.remove('active'))
    el.classList.add('active')
  }

  window.showTab = function(tab) {
    document.getElementById('tab-login').style.display = tab === 'login' ? 'block' : 'none'
    document.getElementById('tab-cadastro').style.display = tab === 'cadastro' ? 'block' : 'none'
    document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'&&i===0)||(tab==='cadastro'&&i===1)))
  }

  window.fazerLogin = async function() {
    const email = document.getElementById('login-email').value.trim()
    const senha = document.getElementById('login-senha').value
    const errEl = document.getElementById('login-error')
    const btn = document.getElementById('btn-login')

    errEl.style.display = 'none'
    if (!email || !senha) { errEl.textContent = 'Preencha e-mail e senha.'; errEl.style.display = 'block'; return }

    btn.disabled = true; btn.textContent = 'Entrando...'

    try {
      const cred = await signInWithEmailAndPassword(auth, email, senha)
      const userDoc = await getDoc(doc(db, 'users', cred.user.uid))
      if (userDoc.exists()) redirectByRole(userDoc.data().role)
      else redirectByRole('colaborador')
    } catch (e) {
      btn.disabled = false; btn.textContent = 'Entrar →'
      if (e.code === 'auth/user-not-found' || e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential') {
        errEl.textContent = 'E-mail ou senha incorretos.'
      } else {
        errEl.textContent = 'Erro ao entrar. Tente novamente.'
      }
      errEl.style.display = 'block'
    }
  }

  window.fazerCadastro = async function() {
    const nome = document.getElementById('cadastro-nome').value.trim()
    const email = document.getElementById('cadastro-email').value.trim()
    const senha = document.getElementById('cadastro-senha').value
    const errEl = document.getElementById('cadastro-error')
    const sucEl = document.getElementById('cadastro-success')
    const btn = document.getElementById('btn-cadastro')

    errEl.style.display = 'none'; sucEl.style.display = 'none'
    if (!nome || !email || !senha) { errEl.textContent = 'Preencha todos os campos.'; errEl.style.display = 'block'; return }
    if (senha.length < 6) { errEl.textContent = 'A senha deve ter pelo menos 6 caracteres.'; errEl.style.display = 'block'; return }

    btn.disabled = true; btn.textContent = 'Criando conta...'

    try {
      const cred = await createUserWithEmailAndPassword(auth, email, senha)
      await setDoc(doc(db, 'users', cred.user.uid), {
        uid: cred.user.uid,
        nome,
        email,
        role: selectedRole,
        criadoEm: new Date().toISOString(),
        ativo: true,
        creditos: selectedRole === 'colaborador' ? 8 : 0,
      })
      sucEl.textContent = `Conta criada! Redirecionando...`
      sucEl.style.display = 'block'
      setTimeout(() => redirectByRole(selectedRole), 1500)
    } catch (e) {
      btn.disabled = false; btn.textContent = 'Criar conta →'
      if (e.code === 'auth/email-already-in-use') {
        errEl.textContent = 'Este e-mail já está cadastrado.'
      } else {
        errEl.textContent = 'Erro ao criar conta. Tente novamente.'
      }
      errEl.style.display = 'block'
    }
  }

  // Enter para submeter
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') {
      const loginVisible = document.getElementById('tab-login').style.display !== 'none'
      if (loginVisible) window.fazerLogin()
      else window.fazerCadastro()
    }
  })
</script>

</body>
</html>
