<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Elyon — Portal do Professor</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Plus+Jakarta+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#FDFAF6; --bg2:#FFFFFF; --bg3:#F5F0E8; --bg4:#EDE8DC;
  --border:#E8E2D8; --border2:#D5CEC0;
  --text:#1C1A16; --text2:#7A7468; --text3:#A8A29A;
  --terra:#A0522D; --terra2:#C4703F; --terra-bg:#FDF0E8; --terra-bdr:#E8C4A8;
  --sage:#4A7C59; --sage-bg:#EAF3EE; --sage-bdr:#A8D0B8;
  --amber:#C8863C; --amber-bg:#FDF3E3;
  --red:#C0392B; --red-bg:#FDECEA;
  --serif:'Playfair Display',serif; --sans:'Plus Jakarta Sans',sans-serif;
  --radius:14px; --radius-sm:8px; --radius-lg:20px;
  --shadow:0 2px 16px rgba(0,0,0,.06);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:var(--sans);background:var(--bg);color:var(--text);min-height:100vh;}

/* NAV BOTTOM MOBILE */
.nav-bottom{position:fixed;bottom:0;left:0;right:0;background:var(--bg2);border-top:1px solid var(--border);display:flex;z-index:100;padding-bottom:env(safe-area-inset-bottom);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px;cursor:pointer;color:var(--text3);font-size:10px;font-weight:500;gap:4px;transition:color .2s;border:none;background:none;font-family:var(--sans);}
.nav-item .icon{font-size:20px;}
.nav-item.active{color:var(--terra);}

/* TOPBAR */
.topbar{position:sticky;top:0;z-index:50;background:var(--bg2);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
.topbar-brand{display:flex;align-items:center;gap:8px;}
.brand-mark{width:32px;height:32px;background:var(--terra);border-radius:8px;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:16px;font-style:italic;color:#fff;}
.topbar-title{font-family:var(--serif);font-size:17px;}
.user-info{display:flex;align-items:center;gap:8px;}
.user-name-el{font-size:12px;color:var(--text2);max-width:90px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.saldo-pill{background:var(--terra-bg);color:var(--terra);border:1px solid var(--terra-bdr);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:600;}
.logout-btn{background:none;border:none;color:var(--text3);cursor:pointer;font-size:16px;}

/* CONTENT */
.content{padding:20px 20px 80px;}
.page{display:none;}
.page.active{display:block;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:translateY(0);}}

/* KPI */
.kpi-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;}
@media(min-width:500px){.kpi-grid{grid-template-columns:repeat(4,1fr);}}
.kpi{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);padding:16px;}
.kpi.terra{border-color:var(--terra-bdr);background:var(--terra-bg);}
.kpi.sage{border-color:var(--sage-bdr);background:var(--sage-bg);}
.kpi.amber{border-color:#E8C888;background:var(--amber-bg);}
.kpi-icon{font-size:18px;margin-bottom:8px;}
.kpi-val{font-family:var(--serif);font-size:26px;font-weight:600;line-height:1;margin-bottom:4px;}
.kpi.terra .kpi-val{color:var(--terra);}
.kpi.sage .kpi-val{color:var(--sage);}
.kpi.amber .kpi-val{color:var(--amber);}
.kpi-label{font-size:11px;color:var(--text2);}

.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;margin-bottom:16px;box-shadow:var(--shadow);}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;}
.card-title{font-family:var(--serif);font-size:14px;font-weight:600;}
.card-body{padding:16px 18px;}

/* AULAS */
.aula-slot{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border);}
.aula-slot:last-child{border-bottom:none;}
.slot-time{font-family:var(--serif);font-size:16px;font-weight:600;color:var(--terra);width:50px;flex-shrink:0;}
.slot-info{flex:1;}
.slot-aluno{font-size:13px;font-weight:600;}
.slot-mod{font-size:11px;color:var(--text3);margin-top:2px;}
.slot-badge{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;}
.slot-online{background:#EBF0F5;color:#2563A8;}
.btn-complete{padding:6px 12px;border-radius:6px;border:1px solid var(--sage-bdr);background:var(--sage-bg);color:var(--sage);font-family:var(--sans);font-size:11px;font-weight:500;cursor:pointer;}
.btn-complete:hover{background:var(--sage);color:#fff;}

/* SALDO */
.saldo-card{background:var(--terra);border-radius:var(--radius-lg);padding:24px;color:#fff;margin-bottom:16px;position:relative;overflow:hidden;}
.saldo-card::before{content:'R$';position:absolute;right:-10px;top:-20px;font-size:120px;font-family:var(--serif);color:rgba(255,255,255,0.04);line-height:1;}
.saldo-label{font-size:11px;color:rgba(255,255,255,0.6);letter-spacing:.06em;text-transform:uppercase;margin-bottom:6px;}
.saldo-valor{font-family:var(--serif);font-size:38px;font-weight:600;margin-bottom:4px;}
.saldo-sub{font-size:12px;color:rgba(255,255,255,0.6);}
.btn-saque{display:inline-flex;align-items:center;gap:6px;margin-top:16px;background:rgba(255,255,255,0.15);color:#fff;border:1px solid rgba(255,255,255,0.2);padding:9px 16px;border-radius:8px;font-family:var(--sans);font-size:13px;cursor:pointer;}

/* PERFIL */
.perfil-header{background:linear-gradient(135deg,var(--terra-bg),#F5EDE8);border:1px solid var(--terra-bdr);border-radius:var(--radius-lg);padding:24px;display:flex;gap:16px;align-items:flex-start;margin-bottom:16px;}
.perfil-avatar{width:64px;height:64px;border-radius:16px;background:linear-gradient(135deg,var(--terra),#C4703F);display:flex;align-items:center;justify-content:center;font-size:28px;border:3px solid var(--bg2);box-shadow:var(--shadow);flex-shrink:0;}
.perfil-name{font-family:var(--serif);font-size:20px;margin-bottom:4px;}
.perfil-spec{font-size:12px;color:var(--text2);}
.tag{display:inline-block;font-size:10px;padding:3px 8px;border-radius:20px;font-weight:500;background:var(--bg2);color:var(--terra);border:1px solid var(--terra-bdr);margin:2px;}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{font-size:11px;font-weight:600;color:var(--text2);margin-bottom:6px;display:block;letter-spacing:.04em;text-transform:uppercase;}
.form-input,.form-textarea{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 12px;font-family:var(--sans);font-size:13px;color:var(--text);outline:none;transition:border-color .2s;}
.form-textarea{resize:vertical;min-height:80px;line-height:1.6;}
.form-input:focus,.form-textarea:focus{border-color:var(--terra);}
.tag-picker{display:flex;flex-wrap:wrap;gap:6px;margin-top:4px;}
.tag-btn{padding:5px 12px;border-radius:20px;border:1px solid var(--border2);background:var(--bg3);color:var(--text2);font-family:var(--sans);font-size:12px;cursor:pointer;transition:all .2s;}
.tag-btn.active{background:var(--terra-bg);border-color:var(--terra-bdr);color:var(--terra);font-weight:500;}
.btn-save{background:var(--terra);color:#fff;border:none;padding:11px 20px;border-radius:var(--radius-sm);font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;margin-top:8px;}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(28,26,22,.5);backdrop-filter:blur(4px);z-index:300;align-items:flex-end;justify-content:center;}
.modal-overlay.open{display:flex;}
.modal{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;width:100%;max-width:500px;padding:24px;animation:slideUp .3s ease;}
@keyframes slideUp{from{transform:translateY(100%);}to{transform:translateY(0);}}
.modal-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px;}
.modal h3{font-family:var(--serif);font-size:20px;margin-bottom:16px;}

/* TOAST */
.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:var(--bg);border-radius:var(--radius);padding:11px 20px;font-size:13px;font-weight:500;z-index:999;opacity:0;transition:all .3s;white-space:nowrap;box-shadow:var(--shadow);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

::-webkit-scrollbar{width:3px;} ::-webkit-scrollbar-thumb{background:var(--border2);}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-brand">
    <div class="brand-mark">E</div>
    <span class="topbar-title">Elyon</span>
  </div>
  <div class="user-info">
    <span class="user-name-el" id="user-name">...</span>
    <span class="saldo-pill" id="saldo-pill">R$ 0</span>
    <button class="logout-btn" onclick="fazerLogout()">⎋</button>
  </div>
</div>

<div class="content">

  <!-- DASHBOARD -->
  <div class="page active" id="page-dashboard">
    <div class="kpi-grid">
      <div class="kpi terra"><div class="kpi-icon">🎓</div><div class="kpi-val" id="kpi-aulas">0</div><div class="kpi-label">aulas realizadas</div></div>
      <div class="kpi sage"><div class="kpi-icon">👥</div><div class="kpi-val" id="kpi-alunos">0</div><div class="kpi-label">alunos</div></div>
      <div class="kpi amber"><div class="kpi-icon">💰</div><div class="kpi-val" id="kpi-saldo">R$0</div><div class="kpi-label">saldo</div></div>
      <div class="kpi"><div class="kpi-icon">⭐</div><div class="kpi-val" id="kpi-rating">—</div><div class="kpi-label">avaliação</div></div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">Aulas de hoje</div></div>
      <div class="card-body" id="aulas-hoje">
        <div style="text-align:center;color:var(--text3);padding:20px;">Carregando...</div>
      </div>
    </div>
  </div>

  <!-- AULAS -->
  <div class="page" id="page-aulas">
    <h2 style="font-family:var(--serif);font-size:20px;font-weight:400;margin-bottom:16px;">Minhas aulas</h2>
    <div class="card">
      <div class="card-body" id="todas-aulas">
        <div style="text-align:center;color:var(--text3);padding:20px;">Carregando...</div>
      </div>
    </div>
  </div>

  <!-- FINANCEIRO -->
  <div class="page" id="page-financeiro">
    <div class="saldo-card">
      <div class="saldo-label">Saldo disponível</div>
      <div class="saldo-valor" id="saldo-valor">R$ 0,00</div>
      <div class="saldo-sub">Aulas concluídas — 70% do valor</div>
      <button class="btn-saque" onclick="openModal()">💸 Solicitar saque</button>
    </div>
    <div class="card">
      <div class="card-header"><div class="card-title">Extrato</div></div>
      <div class="card-body" id="extrato">
        <div style="text-align:center;color:var(--text2);padding:20px;">Nenhuma transação ainda.</div>
      </div>
    </div>
  </div>

  <!-- PERFIL -->
  <div class="page" id="page-perfil">
    <div class="perfil-header">
      <div class="perfil-avatar" id="perfil-avatar">🎸</div>
      <div>
        <div class="perfil-name" id="perfil-name">Carregando...</div>
        <div class="perfil-spec" id="perfil-spec">Professor</div>
        <div style="margin-top:8px;" id="perfil-tags"></div>
      </div>
    </div>
    <div class="card">
      <div class="card-body">
        <div class="form-group"><label class="form-label">Bio profissional</label><textarea class="form-textarea" id="prof-bio" placeholder="Fale sobre sua experiência e metodologia..."></textarea></div>
        <div class="form-group">
          <label class="form-label">Modalidades que você ensina</label>
          <div class="tag-picker" id="mod-picker"></div>
        </div>
        <div class="form-group"><label class="form-label">Cidade</label><input class="form-input" id="prof-cidade" placeholder="Ex: Maringá, PR"></div>
        <div class="form-group"><label class="form-label">Chave Pix</label><input class="form-input" id="prof-pix" placeholder="CPF, e-mail ou telefone"></div>
        <button class="btn-save" onclick="salvarPerfil()">Salvar perfil</button>
      </div>
    </div>
  </div>

</div>

<nav class="nav-bottom">
  <button class="nav-item active" onclick="showPage('dashboard',this)"><span class="icon">🏠</span><span>Início</span></button>
  <button class="nav-item" onclick="showPage('aulas',this)"><span class="icon">📅</span><span>Aulas</span></button>
  <button class="nav-item" onclick="showPage('financeiro',this)"><span class="icon">💰</span><span>Financeiro</span></button>
  <button class="nav-item" onclick="showPage('perfil',this)"><span class="icon">👤</span><span>Perfil</span></button>
</nav>

<!-- MODAL SAQUE -->
<div class="modal-overlay" id="modal" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3>Solicitar saque</h3>
    <div class="form-group"><label class="form-label">Valor (R$)</label><input class="form-input" type="number" id="saque-valor" placeholder="Ex: 150.00"></div>
    <div class="form-group"><label class="form-label">Chave Pix</label><input class="form-input" id="saque-pix" placeholder="Sua chave Pix"></div>
    <div style="display:flex;gap:10px;margin-top:8px;">
      <button style="flex:1;padding:11px;border-radius:8px;border:1px solid var(--border2);background:transparent;cursor:pointer;font-family:var(--sans);" onclick="closeModal()">Cancelar</button>
      <button style="flex:2;padding:11px;border-radius:8px;border:none;background:var(--sage);color:#fff;font-family:var(--sans);font-size:13px;font-weight:600;cursor:pointer;" onclick="confirmarSaque()">Confirmar saque</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js'
  import { getAuth, onAuthStateChanged, signOut } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js'
  import { getFirestore, collection, getDocs, doc, getDoc, updateDoc, addDoc, query, where, increment } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js'

  const firebaseConfig = {
    apiKey: "AIzaSyDkXEI77NRsN52ojk0La4_hgOVmK6sdq1c",
    authDomain: "elyon-hub.firebaseapp.com",
    projectId: "elyon-hub",
    storageBucket: "elyon-hub.firebasestorage.app",
    messagingSenderId: "798443608741",
    appId: "1:798443608741:web:310a082137f374bfe74b4c"
  }

  const app = initializeApp(firebaseConfig)
  const auth = getAuth(app)
  const db = getFirestore(app)

  let currentUser = null
  let userData = null
  let profData = null
  let aulasData = []
  const MODALIDADES = ['Violão','Guitarra','Piano','Teclado','Canto','Bateria','Percussão','Flauta','Violino','Pintura','Aquarela','Desenho','Dança']
  let modsSelecionadas = []

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = 'login.html'; return }
    currentUser = user
    const userDoc = await getDoc(doc(db, 'users', user.uid))
    if (userDoc.exists()) {
      userData = userDoc.data()
      if (userData.role !== 'professor') {
        if (userData.role === 'colaborador') window.location.href = 'app-colaborador_2.html'
        else if (userData.role === 'rh') window.location.href = 'portal-rh_1.html'
        return
      }
      document.getElementById('user-name').textContent = userData.nome?.split(' ')[0] || 'Professor'
    }

    // Carregar perfil do professor
    const profDoc = await getDoc(doc(db, 'professores', user.uid))
    if (profDoc.exists()) {
      profData = profDoc.data()
      modsSelecionadas = profData.modalidades || []
      document.getElementById('prof-bio').value = profData.bio || ''
      document.getElementById('prof-cidade').value = profData.cidade || ''
      document.getElementById('prof-pix').value = profData.pixKey || ''
      document.getElementById('perfil-name').textContent = userData?.nome || 'Professor'
      document.getElementById('perfil-spec').textContent = (profData.modalidades || []).slice(0,2).join(' & ') || 'Professor'
      document.getElementById('perfil-tags').innerHTML = (profData.modalidades || []).map(m => `<span class="tag">${m}</span>`).join('')
      const saldo = profData.saldoCents || 0
      document.getElementById('saldo-pill').textContent = `R$ ${(saldo/100).toFixed(2)}`
      document.getElementById('saldo-valor').textContent = `R$ ${(saldo/100).toFixed(2)}`
      document.getElementById('kpi-saldo').textContent = `R$${Math.round(saldo/100)}`
      document.getElementById('saque-pix').value = profData.pixKey || ''
      document.getElementById('kpi-rating').textContent = profData.avgRating?.toFixed(1) || '—'
    } else {
      // Criar perfil inicial
      await setDoc ? null : null
    }

    renderModPicker()
    carregarAulas()
  })

  function renderModPicker() {
    document.getElementById('mod-picker').innerHTML = MODALIDADES.map(m => `
      <button class="tag-btn ${modsSelecionadas.includes(m)?'active':''}" onclick="toggleMod('${m}',this)">${m}</button>`).join('')
  }

  window.toggleMod = function(m, el) {
    if (modsSelecionadas.includes(m)) modsSelecionadas = modsSelecionadas.filter(x => x !== m)
    else modsSelecionadas.push(m)
    el.classList.toggle('active')
  }

  async function carregarAulas() {
    try {
      const q = query(collection(db, 'aulas'), where('professorId', '==', currentUser.uid))
      const snap = await getDocs(q)
      aulasData = snap.docs.map(d => ({ id: d.id, ...d.data() }))
      const concluidas = aulasData.filter(a => a.status === 'concluida')
      const alunos = new Set(aulasData.map(a => a.colaboradorId)).size
      document.getElementById('kpi-aulas').textContent = concluidas.length
      document.getElementById('kpi-alunos').textContent = alunos
      renderAulasHoje()
      renderTodasAulas()
      renderExtrato()
    } catch(e) { console.error(e) }
  }

  function renderAulasHoje() {
    const hoje = new Date().toLocaleDateString('pt-BR')
    const aulas = aulasData.filter(a => a.data === hoje)
    const el = document.getElementById('aulas-hoje')
    if (!aulas.length) { el.innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px;">Nenhuma aula hoje.</div>'; return }
    el.innerHTML = aulas.map(a => `
      <div class="aula-slot">
        <div class="slot-time">${a.horario||'--'}</div>
        <div class="slot-info">
          <div class="slot-aluno">${a.colaboradorNome||'Aluno'}</div>
          <div class="slot-mod">${a.modalidade||'—'}</div>
        </div>
        <span class="slot-badge slot-online">💻 Online</span>
        ${a.status==='confirmada'?`<button class="btn-complete" onclick="concluirAula('${a.id}')">Concluir</button>`:''}
      </div>`).join('')
  }

  function renderTodasAulas() {
    const el = document.getElementById('todas-aulas')
    if (!aulasData.length) { el.innerHTML = '<div style="text-align:center;color:var(--text3);padding:20px;">Nenhuma aula ainda.</div>'; return }
    el.innerHTML = aulasData.map(a => `
      <div class="aula-slot">
        <div class="slot-time">${a.horario||'--'}</div>
        <div class="slot-info">
          <div class="slot-aluno">${a.colaboradorNome||'Aluno'}</div>
          <div class="slot-mod">${a.modalidade} · ${a.data||'—'}</div>
        </div>
        <span style="font-size:10px;padding:3px 8px;border-radius:20px;font-weight:600;background:${a.status==='concluida'?'var(--bg3)':a.status==='confirmada'?'var(--sage-bg)':'var(--terra-bg)'};color:${a.status==='concluida'?'var(--text3)':a.status==='confirmada'?'var(--sage)':'var(--terra)'};">${a.status}</span>
        ${a.status==='confirmada'?`<button class="btn-complete" onclick="concluirAula('${a.id}')">Concluir</button>`:''}
      </div>`).join('')
  }

  function renderExtrato() {
    const el = document.getElementById('extrato')
    const transacoes = aulasData.filter(a => a.status === 'concluida')
    if (!transacoes.length) { el.innerHTML = '<div style="text-align:center;color:var(--text2);padding:20px;">Nenhuma transação ainda.</div>'; return }
    el.innerHTML = transacoes.map(a => `
      <div style="display:flex;align-items:center;gap:12px;padding:11px 0;border-bottom:1px solid var(--border);">
        <div style="width:34px;height:34px;border-radius:8px;background:var(--sage-bg);display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;">🎸</div>
        <div style="flex:1;">
          <div style="font-size:13px;font-weight:500;">Aula — ${a.colaboradorNome}</div>
          <div style="font-size:11px;color:var(--text3);">${a.data||'—'}</div>
        </div>
        <div style="font-size:13px;font-weight:700;color:var(--sage);">+R$ 112,00</div>
      </div>`).join('')
  }

  window.concluirAula = async function(id) {
    if (!confirm('Marcar esta aula como concluída?')) return
    await updateDoc(doc(db, 'aulas', id), { status: 'concluida' })
    // Adicionar saldo ao professor
    const profRef = doc(db, 'professores', currentUser.uid)
    const profSnap = await getDoc(profRef)
    if (profSnap.exists()) {
      await updateDoc(profRef, { saldoCents: increment(11200), totalAulas: increment(1) })
    }
    showToast('Aula concluída! R$112,00 adicionado ao saldo.')
    carregarAulas()
  }

  window.salvarPerfil = async function() {
    const bio = document.getElementById('prof-bio').value
    const cidade = document.getElementById('prof-cidade').value
    const pixKey = document.getElementById('prof-pix').value
    try {
      const { setDoc } = await import('https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js')
      await setDoc(doc(db, 'professores', currentUser.uid), {
        uid: currentUser.uid,
        nome: userData?.nome,
        email: userData?.email,
        bio, cidade, pixKey,
        modalidades: modsSelecionadas,
        saldoCents: profData?.saldoCents || 0,
        avgRating: profData?.avgRating || 0,
        totalAulas: profData?.totalAulas || 0,
        status: 'ATIVO',
        atualizadoEm: new Date().toISOString()
      }, { merge: true })
      document.getElementById('perfil-name').textContent = userData?.nome || 'Professor'
      document.getElementById('perfil-spec').textContent = modsSelecionadas.slice(0,2).join(' & ') || 'Professor'
      document.getElementById('perfil-tags').innerHTML = modsSelecionadas.map(m => `<span class="tag">${m}</span>`).join('')
      showToast('Perfil salvo com sucesso! ✨')
    } catch(e) { showToast('Erro ao salvar. Tente novamente.') }
  }

  window.confirmarSaque = async function() {
    const valor = parseFloat(document.getElementById('saque-valor').value)
    const pix = document.getElementById('saque-pix').value
    if (!valor || !pix) { showToast('Preencha valor e chave Pix.'); return }
    const saldo = (profData?.saldoCents || 0) / 100
    if (valor > saldo) { showToast('Saldo insuficiente.'); return }
    await addDoc(collection(db, 'saques'), { professorId: currentUser.uid, professorNome: userData?.nome, valor, pixKey: pix, status: 'pendente', criadoEm: new Date().toISOString() })
    await updateDoc(doc(db, 'professores', currentUser.uid), { saldoCents: increment(-Math.round(valor*100)) })
    closeModal()
    showToast(`Saque de R$${valor.toFixed(2)} solicitado!`)
    profData.saldoCents = (profData.saldoCents || 0) - Math.round(valor*100)
    const s = profData.saldoCents / 100
    document.getElementById('saldo-pill').textContent = `R$ ${s.toFixed(2)}`
    document.getElementById('saldo-valor').textContent = `R$ ${s.toFixed(2)}`
  }

  window.showPage = function(name, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'))
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'))
    document.getElementById('page-'+name).classList.add('active')
    el.classList.add('active')
  }

  window.openModal = function() { document.getElementById('modal').classList.add('open') }
  window.closeModal = function() { document.getElementById('modal').classList.remove('open') }
  window.fazerLogout = async function() { await signOut(auth); window.location.href = 'login.html' }

  function showToast(msg) {
    const t = document.getElementById('toast')
    t.textContent = msg; t.classList.add('show')
    setTimeout(() => t.classList.remove('show'), 3000)
  }
</script>
</body>
</html>
